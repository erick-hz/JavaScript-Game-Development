<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Sprite Animation</title>
  </head>
  <body>
    <canvas id="canvas1"></canvas>
    <div class="controls">
      <span class="controls-label">Choose animations:</span>
      <div class="animation-buttons" role="group" aria-label="Choose animation">
        <button class="animation-btn" data-animation="idle" type="button">Idle</button>
        <button class="animation-btn" data-animation="jump" type="button">Jump</button>
        <button class="animation-btn" data-animation="fall" type="button">Fall</button>
        <button class="animation-btn animation-btn--active" data-animation="run" type="button">Run</button>
        <button class="animation-btn" data-animation="dizzy" type="button">Dizzy</button>
        <button class="animation-btn" data-animation="sit" type="button">Sit</button>
        <button class="animation-btn" data-animation="roll" type="button">Roll</button>
        <button class="animation-btn" data-animation="bite" type="button">Bite</button>
        <button class="animation-btn" data-animation="ko" type="button">Ko</button>
        <button class="animation-btn" data-animation="getHit" type="button">Get hit</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
